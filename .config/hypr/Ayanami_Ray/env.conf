cursor {
    no_hardware_cursors = true
}
misc:vfr = true
exec-once = export HWDEC_DRIVER=$(~/.config/scripts/LibvaDriverName.sh)
env = PKG_CONFIG_PATH,/usr/lib/pkgconfig
env = __GL_GSYNC_ALLOWED, 1
# env = LIBVA_DRIVER_NAME,iHD
env = LIBVA_DRIVERS_PATH,/usr/lib/dri
# env = HWDEC_DRIVER,nvdec
# env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,1
env = WLR_EGL_NO_MODIFIERS,0
env = WLR_DRM_NO_ATOMIC,1
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = TDESKTOP_I_KNOW_ABOUT_GTK_INCOMPATIBILITY, 1
# env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_STYLE_OVERRIDE,catppuccin-mocha-teal
env = SDL_VIDEODRIVER,wayland
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DISABLE_RDD_SANDBOX,1
env = MOZ_DBUS_REMOTE,1
env = __GL_MaxFramesAllowed,1
env = WLR_USE_LIBINPUT,1
env = GTK_THEME,catppuccin-mocha-teal-standard+default
env = EDITOR,nvim
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = CLUTTER_BACKEND,wayland
env = FASTFETCH_LOGO_PATH,~/.config/fastfetch/pngs/ayanami_rey2.png
env = LIVE_WALLPAPER_PATH,/home/cybercat/Live_Wallpaper/Ayanami_Rei.mp4
