$entry_color = rgb(C2185B)
$clock_font_size = 111
# BACKGROUND
background {
monitor =
path = ~/.config/hypr/Ayanami_Ray/hyprlock/background.png
#color = $background
contrast = 1
brightness = 0.8
vibrancy = 0.2
vibrancy_darkness = 0.2
zindex = 1
 }

 # GENERAL
 general {
no_fade_in = true
no_fade_out = true
hide_cursor = true
grace = 0
disable_loading_bar = true
 }

background {
    monitor =
    path = ~/.config/hypr/Ayanami_Ray/hyprlock/foreground.png
    zindex = 4
}
# # INPUT FIELD
