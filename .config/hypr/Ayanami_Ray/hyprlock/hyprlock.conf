# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "<i>$(date +"%-H")</i>"
  color = $entry_color 
  font_size = $clock_font_size
  font_family = DS Moster
  position = -292, 35
  halign = center
  valign = center
  zindex = 2
}

label {
  monitor = 
  text = cmd[update:1000] echo "<i>$(date +"%M")</i>"
  color = $entry_color 
  font_size = $clock_font_size
  font_family = DS Moster
  position = 120, 35
  halign = center
  valign = center
  zindex = 2
}



