input-field {
    monitor =
    size = 11%, 5%
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    # shadow_size = 10
    outer_color =  rgb(e687a4) rgb(d43565) 15deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg
    inner_color = rgba(255, 255, 255, 0.5)  
  font_color = rgb(0, 0, 0)
    check_color =  rgb(253, 198, 252);
    # border_size = 10
    fade_on_empty = true
    rounding = -1
    placeholder_text = <i><span font_family="DS Moster" foreground="##1e1e2e">Input Password...</span></i>
    hide_input = false
    position = -24, -400
    halign = center
    valign = center
  zindex = 5
}

