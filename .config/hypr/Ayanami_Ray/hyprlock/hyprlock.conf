# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata --format '{{artist}} - {{title}}' 2>/dev/null)" 
    color = $entry_color 
    font_size = 16
    font_family = DS Moster
    position = -20, 50
    halign = center
    valign = bottom
  zindex = 5
}

