
#--- КЛАВИША МОДИФИКАТОР ------------------------------------------------------
$mainMod = SUPER
$terminal = kitty
$scripts_dir = ~/.config/scripts
$fileManager =  env EDITOR=nvim kitty --class yazi yazi

#--- ЗАПУСК ПРИЛОЖЕНИЙ --------------------------------------------------------
bind = $mainMod, D, exec, pkill rofi ||  ~/.config/hypr/Ayanami_Ray/rofi/launchers/type-6/launcher.sh
bind = $mainMod, H, exec, hyprlock -c ~/.config/hypr/Ayanami_Ray/hyprlock/hyprlock.conf
bind = $mainMod SHIFT, A, exec, kitty anicli-ru
binde = ALT, Tab, cyclenext
bind = $mainMod SHIFT, B, exec, kitty --class bluetooth bluetuith
bind = $mainMod SHIFT, V, exec, code
bind = $mainMod SHIFT, F, exec, firefox
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, L, exec, echo 'cycle pause' | socat - /tmp/mpv-socket
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating 
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f - 
bind =$mainMod SHIFT, M, exec, hyprctl dispatch tagwindow movie && $scripts_dir/movie_mode.sh

# bind = SUPER, g, togglegroup

bind  = $mainMod SHIFT, W, exec, killall -SIGUSR2 waybar || waybar -c ~/.config/hypr/Ayanami_Ray/waybar/config.jsonc -s ~/.config/hypr/Ayanami_Ray/waybar/style.css
bind  = $mainMod, W, exec, killall -SIGUSR1 waybar # Hide waybar
bindl = , switch:Lid Switch, exec, hyprlock -c ~/.config/hypr/Ayanami_Ray/hyprlock/hyprlock.conf &  systemctl suspend || loginctl suspend
bind = $mainMod, P, pseudo
bind = $mainMod, T, togglesplit
bind = $mainMod SHIFT, P, exec, kitty --class pulsemixer pulsemixer
bind = $mainMod SHIFT, T, exec, telegram-desktop
bind = $mainMod CTRL, P, exec, ~/.config/hypr/Ayanami_Ray/rofi/powermenu/type-4/powermenu.sh


#Special
# bindl  =, XF86TouchpadToggle, exec, $scripts_dir/touchpad_toggle.sh
bindel =ALT, up, exec, ddcutil --sleep-multiplier=0.1 setvcp 10 + 10 && $scripts_dir/brightnes_ddcutil.sh
bindel =ALT, down, exec, ddcutil --sleep-multiplier=0.005 setvcp 10 - 10 && $scripts_dir/brightnes_ddcutil.sh
bind   =, XF86Calculator, exec,  qalculate-gtk 
bind   =, XF86ScreenSaver, exec, hyprlock -c ~/.config/hypr/Ayanami_Ray/hyprlock/hyprlock.conf
bindel =, XF86MonBrightnessUp, exec, brightnessctl set 10%+ && $scripts_dir/brightnes.sh
bindel =, XF86MonBrightnessDown, exec, brightnessctl set 10%- && $scripts_dir/brightnes.sh
bindl  =, XF86AudioPlay, exec, playerctl play-pause && $scripts_dir/playerctl_album.sh
bindl  =, XF86AudioPrev, exec, playerctl previous  && $scripts_dir/playerctl_album.sh
bindl  =, XF86AudioNext, exec, playerctl next  && $scripts_dir/playerctl_album.sh
bindl  =, XF86AudioStop, exec, playerctl stop && $scripts_dir/playerctl_album.sh
bindel =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.5 && $scripts_dir/sound.sh
bindel =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- -l 1.5 && $scripts_dir/sound.sh
bindl  =, XF86AudioMute, exec, $scripts_dir/mute.sh
#--- ПЕРЕКЛЮЧЕНИЕ ФОКУСА ------------------------------------------------------
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#--- ПЕРЕКЛЮЧЕНИЕ ВОРКСПЕЙСОВ -------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#--- ПЕРЕМЕЩЕНИЕ ОКОН НА ДРУГОЙ ВОРКСПЕЙС -------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10



# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
#will switch to a submap called resize
bind=$mainMod,R,exec,$scripts_dir/resize.sh "Resize mode activated"
bind=$mainMod,R,submap,resize
# will start a submap called "resize"
submap=resize

# sets repeatable binds for resizing the active window
binde=,right,resizeactive,10 0
binde=,left,resizeactive,-10 0
binde=,up,resizeactive,0 -10
binde=,down,resizeactive,0 10

bind=,escape,exec, $scripts_dir/resize.sh "Resize mode decctivated"
bind = , catchall, exec,$scripts_dir/resize.sh "Resize mode is active"
bind=,escape,submap,reset 
# will reset the submap, meaning end the current one and return to the global one
submap=reset

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#--- ПРАВИЛА ОКОН -------------------------------------------------------------

# hyprctl clients - что бы узнать класс приложения
#windowrule = noborder,^(Rofi)$

