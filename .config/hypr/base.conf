xwayland {
	force_zero_scaling = true
}

workspace= 1, monitor:eDP-1


#See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto-right,1
monitor=eDP-1,preferred,1920x0,1

device {
    name = msft0001:00-04f3:31dd-touchpad
    sensitivity = -0.09
}
#monitor=HDMI-A-1, 1920x180@60, auto, 1, mirror, eDP-1
#monitor=,preferred,auto,1,mirror,eDP-1

exec-once= dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar -c ~/.config/hypr/themes/hypr_arch/waybar/config -s ~/.config/hypr/themes/hypr_arch/waybar/styles.css
exec-once = swaybg -i ~/Wallpapers/mima.png
exec-once = telegram-desktop -startintray
exec-once = [workspace 1 silent]firefox
exec-once = brightnessctl set 100%
exec-once = mako
exec-once = gsettings set org.gnome.desktop.interface gtk-theme ~/Catppuccin-Mocha-Maroon-Cursors
exec-once = gsettings set org.gnome.desktop.interface icon-theme Catppuccin-Mocha-Alt2
exec-once = hyprctl setcursor Catppuccin-Mocha-Teal-Cursors 24
exec-once = dbus-update-activation-environment --all
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Catppuccin-Mocha-Teal-Cursors'


env = HYPRCURSOR_THEME,Catppuccin-Mocha-Maroon-Cursors
env = HYPRCURSOR_SIZE,25
misc:vfr = true
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = __GL_GSYNC_ALLOWED,1
env = WLR_EGL_NO_MODIFIERS,0
# env = WLR_DRM_NO_ATOMIC=1
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = MOZ_DISABLE_RDD_SANDBOX,1
env = MOZ_DBUS_REMOTE,1
env = __GL_MaxFramesAllowed,1
env = WLR_USE_LIBINPUT,1
 # See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/binds.conf

#Envirenment options
env = GTK_THEME,catppuccin-mocha-lavender-standard+default
env = EDITOR,nvim
env = XDG_SESSION_TYPE="wayland"
env = XDG_SESSION_DESKTOP="Hyprland"
env = QT_QPA_PLATFORM="wayland"
env = XDG_CURRENT_DESKTOP="Hyprland"


# Set programs that you use
# $terminal = kitty fish
# $fileManager =  kitty ranger
# $menu = wofi --show drun
#

#bind = $mainMod , H ,toggleopaque
# Some default env vars.
# env = XCURSOR_SIZE,24
# env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that
# env = GTK_THEME, Tokyonight-Dark-BL-LB
# env = LIBVA_DRIVER_NAME,nvidia
# env = XDG_SESSION_TYPE,wayland
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_NO_HARDWARE_CURSORS,1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = rgba(d8dee8ff) rgba(afc8e9ff) 45deg
    col.inactive_border = rgba(2f343fff)

    layout = dwindle
	 no_border_on_floating = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

#----ДЕКОРАЦИЯ---ОКОН--------------------------------------------
decoration {
    rounding = 15
    
    blur {
        enabled = true
        size = 3
        passes = 1
		  new_optimizations =true
    }

    # drop_shadow = false
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = ease-in-out,0,0,1,1
	 animation = borderangle,1,100,ease-in-out,loop
	 bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

# master {
#     # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
#     new_is_master = true
# }

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = true
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more


