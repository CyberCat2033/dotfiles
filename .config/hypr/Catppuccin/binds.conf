
#--- КЛАВИША МОДИФИКАТОР ------------------------------------------------------
$mainMod = SUPER
$terminal = kitty
$fileManager =  env EDITOR=nvim kitty --class ranger ranger

#--- ЗАПУСК ПРИЛОЖЕНИЙ --------------------------------------------------------
bind = $mainMod, D, exec, pkill rofi ||  ~/.config/hypr/Catppuccin/rofi/launchers/type-6/launcher.sh
bind = $mainMod, H, exec, hyprlock -c ~/.config/hypr/Catppuccin/hyprlock/hyprlock.conf
bind = $mainMod SHIFT, A, exec, kitty --class anime anicli-ru --ffmpeg
bindel = ALT, Tab, cyclenext
bind = $mainMod SHIFT, B, exec, kitty --class bluetooth bluetuith
bind = $mainMod SHIFT, V, exec, code
bind = $mainMod SHIFT, F, exec, firefox
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod SHIFT, L, exec, echo 'cycle pause' | socat - /tmp/mpv-socket
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating 
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f - 

# bind = SUPER, g, togglegroup

bind  = $mainMod SHIFT, W, exec, killall -SIGUSR2 waybar # Reload waybar
bind  = $mainMod, W, exec, killall -SIGUSR1 waybar # Hide waybar
bindl = , switch:Lid Switch, exec, hyprlock -c ~/.config/hypr/Catppuccin/hyprlock/hyprlock.conf &  systemctl suspend || loginctl suspend

bind = $mainMod, P, pseudo
bind = $mainMod, T, togglesplit
bind = $mainMod SHIFT, P, exec, kitty --class pulsemixer pulsemixer
bind = $mainMod SHIFT, T, exec, telegram-desktop
bind = $mainMod CTRL, P, exec, ~/.config/hypr/Catppuccin/rofi/powermenu/type-4/powermenu.sh


#Special
bind   = ,XF86Calculator, exec,  qalculate-gtk 
bind  =, XF86ScreenSaver, exec, hyprlock -c ~/.config/hypr/Catppuccin/hyprlock/hyprlock.conf
bindel =, XF86MonBrightnessUp, exec, brightnessctl set 10%+ && ~/.config/scripts/brightnes.sh
bindel =, XF86MonBrightnessDown, exec, brightnessctl set 10%- && ~/.config/scripts/brightnes.sh
bindl  =, XF86AudioPlay, exec, playerctl play-pause && ~/.config/scripts/playerctl_album.sh
bindl  =, XF86AudioPrev, exec, playerctl previous  && ~/.config/scripts/playerctl_album.sh
bindl  =, XF86AudioNext, exec, playerctl next  && ~/.config/scripts/playerctl_album.sh
bindl  =, XF86AudioStop, exec, playerctl stop && ~/.config/scripts/playerctl_album.sh
bindel =, XF86AudioRaiseVolume, exec, pulsemixer --change-volume +5 && ~/.config/scripts/sound.sh
bindel =, XF86AudioLowerVolume, exec, pulsemixer --change-volume -5 && ~/.config/scripts/sound.sh
bindl  =, XF86AudioMute, exec, ~/.config/scripts/mute.sh
#--- ПЕРЕКЛЮЧЕНИЕ ФОКУСА ------------------------------------------------------
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#--- ПЕРЕКЛЮЧЕНИЕ ВОРКСПЕЙСОВ -------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#--- ПЕРЕМЕЩЕНИЕ ОКОН НА ДРУГОЙ ВОРКСПЕЙС -------------------------------------
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10



# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bind=$mainMod,R,exec,~/.config/scripts/resize.sh "Resize mode activated"
bind=$mainMod,R,submap,resize
submap=resize

binde=,right,resizeactive,10 0
binde=,left,resizeactive,-10 0
binde=,up,resizeactive,0 -10
binde=,down,resizeactive,0 10

bind=,escape,exec, ~/.config/scripts/resize.sh "Resize mode decctivated"
bind = , catchall, exec,~/.config/scripts/resize.sh "Resize mode is active"
bind=,escape,submap,reset 
submap=reset

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow



