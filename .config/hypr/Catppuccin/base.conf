xwayland {
	force_zero_scaling = true
}

ecosystem:no_update_news = true

misc:vfr = true
monitor=,highres,auto-right,1
monitor=eDP-1,preferred,1920x0,1,

device {
    name = msft0001:00-04f3:31dd-touchpad
    sensitivity = -0.09
}
device {
  name = elan-touchpad
  sensitivity =  0.42
}

device {
  name = elan06fa:00-04f3:31dd-touchpad
  sensitivity =  0.42
}

input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle, compose:ralt
    kb_rules =
    scroll_factor = 1.0

    follow_mouse = 1
    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
    touchpad {
       natural_scroll = false
       scroll_factor = 0.6
    }
}

general { 
    gaps_in = 4
    gaps_out = 12

    border_size = 2
    col.active_border = rgba(f2cdcdee) rgba(f5e0dcee) 45deg
    col.inactive_border = rgba(1e1e2eff)
    resize_on_border = false 
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0


    blur {
        enabled = true
        size = 6
        passes = 1
        xray = true
        ignore_opacity = true
        vibrancy = 0.1696
    }

  # blurls = waybar
}


animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.15, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.15, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.15, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1 # use with .2s duration
    # Animation configs
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    animation = layers, 1, 2, md3_decel, slide
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 2.5, softAcDecel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}
#


dwindle {

    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}


misc { 
  animate_manual_resizes = true
  mouse_move_focuses_monitor = true
  enable_swallow = true                                                                                                                                                                    
  swallow_regex = ^(kitty|Alacritty)$
  swallow_exception_regex = ^(yazi|bluetuith|pulsemixer|nmwui)$
  disable_hyprland_logo = true
  disable_splash_rendering = true
  mouse_move_enables_dpms = true
  force_default_wallpaper = 0
}
