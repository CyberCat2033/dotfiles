# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata --format '{{artist}} - {{title}}' 2>/dev/null)" 
    color = $entry_color 
    font_size = 16
    font_family = DS Moster
    position = 0, 50
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "$(whoami)"
    color =  $entry_color 
  font_size = 14
    font_family = DS Moster
    position = 0, -10
    halign = center
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/scripts/battery_status.sh)"
    color = $entry_color 
    font_size = 17
    font_family = JetBrains Mono
    position = -90, -10
    halign = right
    valign = top
}

